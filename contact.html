<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ALICI'ART</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        .contact-container {
            max-width: 800px;
            margin: 60px auto;
            padding: 0 20px;
        }

        .contact-box {
            background: white;
            border: 6px solid var(--color-dark);
            box-shadow: 15px 15px 0px var(--color-habanero);
            padding: 40px;
        }

        .contact-title {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 2.5rem;
            margin-bottom: 30px;
            line-height: 1;
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group label {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--color-dark);
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 3px solid var(--color-dark);
            font-family: 'Rubik', sans-serif;
            font-size: 1rem;
            background-color: #f9f9f9;
            box-sizing: border-box; /* Évite que le champ ne dépasse */
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            background-color: white;
            box-shadow: 5px 5px 0px var(--color-habanero);
        }

        .submit-btn {
            background: var(--color-dark);
            color: white;
            border: none;
            padding: 15px 40px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            background: var(--color-habanero);
            transform: translate(-3px, -3px);
            box-shadow: 6px 6px 0px var(--color-dark);
        }

        @media (max-width: 600px) {
            .contact-title { font-size: 1.8rem; }
            .contact-box { padding: 25px; }
        }
    </style>
</head>
<body class="color-yellow-bg">

    <header class="main-header">
        <div class="container_full">
            <h1 class="logo"><a href="index.html">ALICI'ART.</a></h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html">Accueil</a></li>
                    <li><a href="travaux.html">Projets</a></li>
                    <li><a href="contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="contact-container">
        <div class="contact-box">
            <h2 class="contact-title">Dites-moi <span class="color-chili-text">Bonjour !</span></h2>
            
            <form
                action="https://formspree.io/f/mjglbnpw"
                method="POST"
                >
                <label>
                    Your email:
                    <input type="email" name="email">
                </label>
                <label>
                    Your message:
                    <textarea name="message"></textarea>
                </label>
                <!-- your other form fields go here -->
                <button type="submit">Send</button>
            </form>
        </div>
    </main>

    <footer class="main-footer color-dark-bg">
        <p>&copy; 2026 ALICI'ART. Osez la couleur.</p>
    </footer>

</body>
</html>
