<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ALICI'ART</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- STRUCTURE POUR LE FOOTER EN BAS --- */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Rubik', sans-serif;
        }

        main {
            flex: 1; /* Pousse le footer vers le bas */
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        /* --- STYLE DU FORMULAIRE --- */
        .contact-box {
            background: white;
            border: 6px solid var(--color-dark);
            box-shadow: 15px 15px 0px var(--color-habanero);
            padding: 40px;
            width: 100%;
            max-width: 600px;
        }

        .contact-title {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 2.5rem;
            margin-bottom: 30px;
            line-height: 1;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-group label {
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.9rem;
            color: var(--color-dark);
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 3px solid var(--color-dark);
            font-family: 'Rubik', sans-serif;
            font-size: 1rem;
            background-color: #f9f9f9;
            box-sizing: border-box;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            background-color: white;
            box-shadow: 5px 5px 0px var(--color-habanero);
        }

        .submit-btn {
            background: var(--color-dark);
            color: white;
            border: none;
            padding: 15px 40px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            font-size: 1.1rem;
            width: 100%; /* Bouton sur toute la largeur */
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            background: var(--color-habanero);
            transform: translate(-3px, -3px);
            box-shadow: 6px 6px 0px var(--color-dark);
        }

        @media (max-width: 600px) {
            .contact-title { font-size: 1.8rem; }
            .contact-box { padding: 25px; }
        }
    </style>
</head>
<body class="color-yellow-bg">

    <div id="header-placeholder"></div>

    <main>
        <div class="contact-box">
            <h2 class="contact-title">Contactez-moi !</h2>
            
            <form action="https://formspree.io/f/mjglbnpw" method="POST">
                <div class="form-group">
                    <label for="email">Votre email</label>
                    <input type="email" id="email" name="email" placeholder="votre@email.com" required>
                </div>

                <div class="form-group">
                    <label for="message">Votre message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Écrivez ici..." required></textarea>
                </div>

                <button type="submit" class="submit-btn">Envoyer</button>
            </form>
        </div>
    </main>

    <div id="footer-placeholder"></div>

</body>
</html>
