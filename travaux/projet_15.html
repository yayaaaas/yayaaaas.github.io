<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet 15 | ALICI'ART</title>
    <link rel="stylesheet" href="../style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <style>
        /* --- STRUCTURE GLOBALE --- */
        .p15-main-layout {
            display: grid !important;
            grid-template-columns: 350px 1fr !important;
            gap: 40px;
            align-items: start;
            margin-top: 30px;
        }

        .p15-phone-column {
            position: sticky;
            top: 100px;
        }

        .phone-mockup {
            width: 100%;
            height: 650px;
            background: var(--color-dark);
            border: 12px solid var(--color-dark);
            border-radius: 45px;
            box-shadow: 10px 10px 0px var(--color-habanero);
            overflow: hidden;
        }

        .phone-screen iframe {
            width: 100%;
            height: 650px;
            border: none;
        }

        /* --- TAILLE UNIFIÉE (15%) --- */
        /* On applique 15% aux conteneurs Flip et aux carrousels */
        .p15-uniform-size {
            width: 15% !important;
            min-width: 160px; /* Sécurité pour la lisibilité */
            margin-bottom: 40px;
        }

        /* Grille pour les 2 cartes Flip côte à côte */
        .p12-trio-container {
            display: grid !important;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        /* Style des Cartes Flip */
        .p12-flip-card {
            display: block;
            cursor: pointer;
            perspective: 1000px;
        }

        .p12-flip-card input { display: none; }

        .p12-flip-inner {
            position: relative;
            width: 100%;
            aspect-ratio: 1 / 1.6;
            transition: transform 0.6s;
            transform-style: preserve-3d;
        }

        .p12-flip-card input:checked + .p12-flip-inner {
            transform: rotateY(180deg);
        }

        .p12-front, .p12-back {
            position: absolute;
            top: 0; left: 0;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border: 3px solid var(--color-dark);
            box-shadow: 5px 5px 0px var(--color-dark);
        }

        .p12-back { transform: rotateY(180deg); }

        .p12-front img, .p12-back img, .carousel-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Style Carrousels */
        .standard-carousel {
            position: relative;
            overflow: hidden;
            border: 3px solid var(--color-dark);
            box-shadow: 5px 5px 0px var(--color-dark);
            background: white;
        }

        .carousel-inner {
            display: flex;
            transition: transform 0.5s ease;
        }

        .carousel-item { min-width: 100%; }

        /* Responsive */
        @media (max-width: 1100px) {
            .p15-uniform-size { width: 30% !important; }
        }

        @media (max-width: 900px) {
            .p15-main-layout { grid-template-columns: 1fr !important; }
            .p15-phone-column { position: relative; top: 0; margin-bottom: 40px; }
            .p15-uniform-size { width: 100% !important; }
        }
    </style>
</head>
<body class="color-yellow-bg">

    <header class="main-header">
        <div class="container_full">
            <h1 class="logo"><a href="../index.html">ALICI'ART.</a></h1>
            <nav class="main-nav">
                <ul>
                    <li><a href="../index.html">Accueil</a></li>
                    <li><a href="../travaux.html">Projets</a></li>
                    <li><a href="../contact.html">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container_full project-detail-page">
        <a href="../travaux.html" class="back-link">← Retour aux travaux</a>

        <header class="project-header-simple">
            <span class="project-type color-chili-text">UI / UX DESIGN</span>
            <h2 class="super-title">PROJET 15 : Design Bilingue</h2>
        </header>

        <section class="p15-main-layout">
            
            <div class="p15-phone-column">
                <h4 class="p12-label">Prototype Interactif</h4>
                <div class="phone-mockup">
                    <div class="phone-screen">
                        <iframe src="TON_LIEN_FIGMA" allowfullscreen></iframe>
                    </div>
                </div>
            </div>

            <div class="p15-content-column">
                
                <div class="p15-section">
                    <h4 class="p12-label">Interfaces (Cliquer pour version EN)</h4>
                    <div class="p15-uniform-size">
                        <div class="p12-trio-container">
                            <label class="p12-flip-card">
                                <input type="checkbox">
                                <div class="p12-flip-inner">
                                    <div class="p12-front"><img src="../img/travaux/projet15/1-fr.png"></div>
                                    <div class="p12-back"><img src="../img/travaux/projet15/1-en.png"></div>
                                </div>
                            </label>
                            <label class="p12-flip-card">
                                <input type="checkbox">
                                <div class="p12-flip-inner">
                                    <div class="p12-front"><img src="../img/travaux/projet15/2-fr.png"></div>
                                    <div class="p12-back"><img src="../img/travaux/projet15/2-en.png"></div>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="p15-section">
                    <h4 class="p12-label">Recherches (FR)</h4>
                    <div class="p15-uniform-size">
                        <div class="standard-carousel" id="carousel-A-FR">
                            <div class="carousel-inner">
                                <div class="carousel-item"><img src="../img/travaux/projet15/A1-fr.png"></div>
                                <div class="carousel-item"><img src="../img/travaux/projet15/A2-fr.png"></div>
                            </div>
                            <button class="carousel-control prev" onclick="moveSlideProject15(-1, 'carousel-A-FR')">❮</button>
                            <button class="carousel-control next" onclick="moveSlideProject15(1, 'carousel-A-FR')">❯</button>
                        </div>
                    </div>

                    <h4 class="p12-label">Recherches (EN)</h4>
                    <div class="p15-uniform-size">
                        <div class="standard-carousel" id="carousel-A-EN">
                            <div class="carousel-inner">
                                <div class="carousel-item"><img src="../img/travaux/projet15/A1-en.png"></div>
                                <div class="carousel-item"><img src="../img/travaux/projet15/A2-en.png"></div>
                            </div>
                            <button class="carousel-control prev" onclick="moveSlideProject15(-1, 'carousel-A-EN')">❮</button>
                            <button class="carousel-control next" onclick="moveSlideProject15(1, 'carousel-A-EN')">❯</button>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script>
        function moveSlideProject15(direction, carouselId) {
            const carousel = document.getElementById(carouselId);
            const inner = carousel.querySelector('.carousel-inner');
            const items = carousel.querySelectorAll('.carousel-item');
            if (!carousel.dataset.index) carousel.dataset.index = 0;
            let index = parseInt(carousel.dataset.index) + direction;
            if (index >= items.length) index = 0;
            if (index < 0) index = items.length - 1;
            carousel.dataset.index = index;
            inner.style.transform = `translateX(${-index * 100}%)`;
        }
    </script>
</body>
</html>
