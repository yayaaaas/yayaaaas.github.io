<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet 16 - Carrousels</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fcfcfc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .main-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end; /* Aligne les carrousels par le bas */
            gap: 50px;
            padding: 40px;
        }

        .carousel-wrapper {
            text-align: center;
        }

        .carousel-title {
            margin-bottom: 15px;
            font-size: 0.9rem;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .carousel-box {
            background: #eee;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.08);
            overflow: hidden;
            border: 1px solid #eee;
            position: relative;
            transition: transform 0.3s ease;
        }

        .carousel-box:hover {
            transform: translateY(-5px);
        }

        /* Format A4 (21 x 29.7) */
        .format-a4 {
            width: 280px;
            aspect-ratio: 21 / 29.7;
        }

        /* Format Story (9 x 16) */
        .format-story {
            width: 200px;
            aspect-ratio: 9 / 16;
        }

        /* Placeholder pour vos images */
        .carousel-content {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #fff 0%, #f0f0f0 100%);
            color: #ccc;
            font-size: 0.8rem;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="main-container">
        
        <div class="carousel-wrapper">
            <div class="carousel-title">Format A4</div>
            <div class="carousel-box format-a4">
                <div class="carousel-content">
                    <img src="https://via.placeholder.com/210x297" alt="A4 Visual">
                </div>
            </div>
        </div>

        <div class="carousel-wrapper">
            <div class="carousel-title">Format Story</div>
            <div class="carousel-box format-story">
                <div class="carousel-content">
                    <img src="https://via.placeholder.com/1080x1920" alt="Story Visual">
                </div>
            </div>
        </div>

    </div>

</body>
</html>
