<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Écrits | ALICI'ART</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="header.js"></script>
    <script src="footer.js"></script>
    <style>
        /* --- STRUCTURE POUR BLOQUER LE FOOTER EN BAS --- */
        html, body {
            height: 100%;
            margin: 0;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Rubik', sans-serif;
        }

        main {
            flex: 1; /* Pousse le footer vers le bas */
            display: flex;
            justify-content: center;
            align-items: center; /* Centre le texte verticalement */
            padding: 20px;
        }

        /* --- STYLE DE LA BOX CENTRALE --- */
        .maintenance-box {
            background: white;
            border: 6px solid var(--color-dark);
            box-shadow: 15px 15px 0px var(--color-habanero);
            padding: 50px;
            text-align: center; /* Centre le texte horizontalement */
            max-width: 600px;
            transition: transform 0.3s ease;
        }

        .maintenance-box:hover {
            transform: translate(-5px, -5px);
            box-shadow: 20px 20px 0px var(--color-dark);
        }

        .maintenance-title {
            font-weight: 900;
            text-transform: uppercase;
            font-size: 2.5rem;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .maintenance-text {
            font-weight: 500;
            font-size: 1.1rem;
            color: var(--color-dark);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 0;
        }

        @media (max-width: 600px) {
            .maintenance-title { font-size: 1.8rem; }
            .maintenance-box { padding: 30px; }
        }
    </style>
</head>
<body class="color-yellow-bg">

    <div id="header-placeholder"></div>

    <!-- CONTENU CENTRÉ -->
    <main>
        <div class="maintenance-box">
            <h2 class="maintenance-title">Section en cours de <span class="color-chili-text">préparation</span></h2>
            <p class="maintenance-text">Mes textes arrivent bientôt sur aliciart.fr</p>
        </div>
    </main>

    <!-- FOOTER BLOQUÉ EN BAS -->
    <footer class="main-footer color-dark-bg">
        <p>&copy; 2026 ALICI'ART. Osez la couleur.</p>
    </footer>

</body>
</html>
